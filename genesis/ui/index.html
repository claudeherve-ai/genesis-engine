<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Genesis Engine — AI that builds AI</title>
<style>
  :root { --green: #00ff41; --dark: #0a0f0a; --darker: #050805; --dim: #008f22; --glow: #00ff4188; --red: #ff3333; --yellow: #ffcc00; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--darker); color: var(--green); font-family: 'Courier New', monospace; min-height: 100vh; display: flex; flex-direction: column; }
  .scanline { position: fixed; top: 0; left: 0; width: 100%; height: 3px; background: var(--glow); opacity: 0.3; animation: scan 4s linear infinite; pointer-events: none; z-index: 999; }
  @keyframes scan { 0% { top: -4px; } 100% { top: 100%; } }
  header { padding: 1.5rem; text-align: center; border-bottom: 1px solid var(--dim); }
  header h1 { font-size: 1.8rem; letter-spacing: 0.2em; text-shadow: 0 0 15px var(--glow); }
  header p { color: var(--dim); font-size: 0.8rem; margin-top: 0.25rem; }
  main { flex: 1; max-width: 900px; margin: 0 auto; width: 100%; padding: 1.5rem; display: flex; flex-direction: column; gap: 1rem; }
  .input-area { display: flex; gap: 0.5rem; }
  .input-area textarea {
    flex: 1; background: var(--dark); border: 1px solid var(--dim); color: var(--green);
    padding: 0.75rem; font-family: inherit; font-size: 0.9rem; resize: vertical;
    min-height: 80px; border-radius: 4px;
  }
  .input-area textarea:focus { outline: none; border-color: var(--green); box-shadow: 0 0 10px var(--glow); }
  .input-area button {
    background: var(--dim); border: none; color: var(--darker); padding: 0 1.5rem;
    font-family: inherit; font-weight: bold; cursor: pointer; border-radius: 4px;
    font-size: 0.9rem; letter-spacing: 0.1em; transition: all 0.2s;
  }
  .input-area button:hover { background: var(--green); box-shadow: 0 0 15px var(--glow); }
  .input-area button:disabled { opacity: 0.3; cursor: not-allowed; }
  .progress { background: var(--dark); border: 1px solid var(--dim); padding: 1.5rem; border-radius: 4px; display: none; }
  .stage { display: flex; align-items: center; gap: 0.75rem; padding: 0.5rem 0; }
  .stage .icon { font-size: 1.2rem; width: 2rem; }
  .stage .label { flex: 1; font-size: 0.85rem; }
  .stage .status { color: var(--dim); font-size: 0.8rem; }
  .stage.done .status { color: var(--green); }
  .stage.active .status { color: var(--yellow); animation: pulse 0.5s infinite; }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }
  .results { display: none; }
  .result-card { background: var(--dark); border: 1px solid var(--dim); padding: 1.25rem; border-radius: 4px; margin-bottom: 0.75rem; }
  .result-card h3 { margin-bottom: 0.5rem; display: flex; justify-content: space-between; }
  .result-card .role { color: var(--dim); font-size: 0.85rem; }
  .result-card .prompt { color: var(--dim); font-size: 0.8rem; margin-top: 0.5rem; max-height: 100px; overflow-y: auto; }
  .bar-container { height: 6px; background: var(--darker); margin: 0.5rem 0; border-radius: 2px; }
  .bar-fill { height: 100%; border-radius: 2px; transition: width 0.5s; }
  .error { color: var(--red); padding: 1rem; display: none; }
  .stats { display: flex; gap: 1.5rem; padding: 1rem 0; }
  .stat { text-align: center; }
  .stat .value { font-size: 1.5rem; text-shadow: 0 0 10px var(--glow); }
  .stat .label { color: var(--dim); font-size: 0.7rem; margin-top: 0.25rem; }
  footer { text-align: center; padding: 1rem; color: var(--dim); font-size: 0.7rem; border-top: 1px solid var(--dim); }
</style>
</head>
<body>
<div class="scanline"></div>
<header>
  <h1>G E N E S I S &nbsp; E N G I N E</h1>
  <p>AI THAT BUILDS AI // AZURE FOUNDRY (GPT-5.4)</p>
</header>
<main>
  <div class="input-area">
    <textarea id="problem" placeholder="Describe the multi-agent system you need...

Example: I need a customer support system with triage, technical support, and billing agents."></textarea>
    <button id="buildBtn" onclick="build()">▸ BUILD</button>
  </div>
  <div class="error" id="error"></div>
  <div class="progress" id="progress">
    <div class="stage" id="stage-analyze"><span class="icon">🔍</span><span class="label">ANALYZE</span><span class="status">waiting...</span></div>
    <div class="stage" id="stage-architect"><span class="icon">🏗️</span><span class="label">ARCHITECT</span><span class="status">waiting...</span></div>
    <div class="stage" id="stage-build"><span class="icon">🔧</span><span class="label">BUILD</span><span class="status">waiting...</span></div>
    <div class="stage" id="stage-test"><span class="icon">🧪</span><span class="label">TEST</span><span class="status">waiting...</span></div>
    <div class="stage" id="stage-deploy"><span class="icon">🚀</span><span class="label">DEPLOY</span><span class="status">waiting...</span></div>
  </div>
  <div class="results" id="results"></div>
</main>
<footer>GENESIS ENGINE v0.1.0 // AZURE CONTAINER APPS (EASTUS2)</footer>
<script>
const API = '/v1';
let pollTimer = null;

async function build() {
  const problem = document.getElementById('problem').value.trim();
  if (!problem) return;

  const btn = document.getElementById('buildBtn');
  btn.disabled = true;
  btn.textContent = '...';

  document.getElementById('error').style.display = 'none';
  document.getElementById('results').style.display = 'none';
  document.getElementById('progress').style.display = 'block';

  // Reset stages
  document.querySelectorAll('.stage').forEach(s => { s.classList.remove('active','done'); s.querySelector('.status').textContent = 'waiting...'; });

  try {
    const r = await fetch(API + '/generate', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ problem, target: 'agentsystem' })
    });
    if (!r.ok) throw new Error((await r.json()).detail || 'API error');
    const data = await r.json();
    const buildId = data.build_id;
    pollBuild(buildId);
  } catch(e) {
    showError(e.message);
    btn.disabled = false;
    btn.textContent = '▸ BUILD';
  }
}

function pollBuild(buildId) {
  const stageMap = { analyze: 'stage-analyze', architect: 'stage-architect', build: 'stage-build', test: 'stage-test', deploy: 'stage-deploy' };
  const stageOrder = ['analyze','architect','build','test','deploy'];
  let seen = new Set();

  pollTimer = setInterval(async () => {
    try {
      const r = await fetch(API + '/builds/' + buildId);
      const d = await r.json();
      const stage = d.stage;
      const status = d.status;

      if (stage && !seen.has(stage)) {
        seen.add(stage);
        const el = document.getElementById(stageMap[stage]);
        if (el) { el.classList.add('active'); el.querySelector('.status').textContent = 'running...'; }

        // Mark previous stages done
        const idx = stageOrder.indexOf(stage);
        for (let i = 0; i < idx; i++) {
          const prev = document.getElementById(stageMap[stageOrder[i]]);
          if (prev) { prev.classList.remove('active'); prev.classList.add('done'); prev.querySelector('.status').textContent = '✓ done'; }
        }
      }

      if (status === 'completed') {
        clearInterval(pollTimer);
        // Mark all done
        stageOrder.forEach(s => {
          const el = document.getElementById(stageMap[s]);
          if (el) { el.classList.remove('active'); el.classList.add('done'); el.querySelector('.status').textContent = '✓ done'; }
        });
        document.getElementById('stage-deploy').querySelector('.status').textContent = '✓ deployed';

        // Show results
        const results = document.getElementById('results');
        results.style.display = 'block';
        const agents = (d.artifacts || {}).agents || [];
        const score = ((d.test_results || {}).overall_score || 0) * 100;

        let html = '<div class="stats">';
        html += `<div class="stat"><div class="value" style="color:${score>=70?'var(--green)':'var(--yellow)'}">${score.toFixed(0)}%</div><div class="label">TEST SCORE</div></div>`;
        html += `<div class="stat"><div class="value">${agents.length}</div><div class="label">AGENTS</div></div>`;
        html += `<div class="stat"><div class="value">${d.retries||0}</div><div class="label">RETRIES</div></div>`;
        html += '</div>';

        agents.forEach(a => {
          html += '<div class="result-card"><h3><span>' + a.name + '</span><span class="role">' + a.role + '</span></h3><div class="prompt">' + (a.system_prompt||'').slice(0,300) + '...</div></div>';
        });
        html += '<div style="margin-top:1rem;text-align:center"><button onclick="downloadAgents(\'' + buildId + '\')" style="background:var(--dim);border:none;color:var(--darker);padding:0.5rem 1.5rem;font-family:inherit;font-weight:bold;cursor:pointer;border-radius:4px">⬇ EXPORT AGENTS</button><span style="color:var(--dim);font-size:0.7rem;margin-left:1rem">Downloads JSON + Markdown per agent</span></div>';
        results.innerHTML = html;
        document.getElementById('buildBtn').disabled = false;
        document.getElementById('buildBtn').textContent = '▸ BUILD';
      } else if (status === 'failed') {
        clearInterval(pollTimer);
        showError(d.error || 'Build failed');
        document.getElementById('buildBtn').disabled = false;
        document.getElementById('buildBtn').textContent = '▸ BUILD';
      }
    } catch(e) {
      // Keep polling
    }
  }, 1500);
}

function showError(msg) {
  const el = document.getElementById('error');
  el.textContent = '✗ ' + msg;
  el.style.display = 'block';
}

async function downloadAgents(buildId) {
  const r = await fetch(API + '/builds/' + buildId + '/export?format=individual');
  const d = await r.json();
  const files = d.files || {};
  for (const [filename, content] of Object.entries(files)) {
    const blob = new Blob([content], {type: 'text/plain'});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = filename;
    a.click();
  }
}
</script>
</body>
</html>
